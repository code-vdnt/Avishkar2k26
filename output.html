<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AVISHKAR 2k26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-card {
            background: white;
            max-width: 400px;
            margin: 80px auto;
            padding: 40px 30px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body style="background: var(--gray-50);">

    <!-- ═══════ NAVBAR ═══════ -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="brand-icon">⚡</div>
                <div>
                    <h1 class="nav-title">AVISHKAR 2k26 Portal</h1>
                    <p class="nav-subtitle">Innovation • Technology • Impact</p>
                </div>
            </div>
            <!-- Nav links removed -->
        </div>
    </nav>

    
    
    <div class="container" style="padding-top: 20px; max-width: 420px;">
        
        <div class="flash-message flash-error" style="margin-bottom: 10px;">
            <span>⚠️ Please log in to access the admin portal.</span>
            <button class="flash-close" onclick="this.parentElement.remove()">✕</button>
        </div>
        
    </div>
    
    

    <div class="container">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h2 style="color: var(--primary); margin-bottom: 30px;">Admin Login</h2>
            <form method="POST" action="/login">
                <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" required placeholder="Enter admin username">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 30px;">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(255, 106, 0, 0.4);">
                    Login to Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- ═══════ FOOTER ═══════ -->
    <footer class="footer" style="position: absolute; bottom: 0; width: 100%;">
        <div class="container" style="text-align: center; padding: 20px; color: var(--gray-500);">
            <p>© 2026 AVISHKAR 2k26 Registration Portal. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
